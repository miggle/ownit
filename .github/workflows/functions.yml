name: Deploy Firebase Functions and Firestore

on:
  push:
    branches:
      - main
    paths:
      - 'functions/**'
      - 'firestore.rules'
      - 'firestore.indexes.json'
      - 'firebase.json'
      - '.github/workflows/functions.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # Workload Identity Federation (keyless auth)

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: functions/package-lock.json

      - name: Install and build functions
        working-directory: functions
        run: |
          npm ci
          npm run build

      - name: Authenticate to Google Cloud (keyless / OIDC)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/804316033885/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: ownit-deployer@ownit-afc0f.iam.gserviceaccount.com

      - name: Deploy functions, rules, and indexes
        run: |
          npm install -g firebase-tools
          firebase deploy --only functions,firestore:rules,firestore:indexes --project ownit-afc0f --non-interactive
