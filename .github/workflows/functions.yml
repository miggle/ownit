name: Deploy Firebase Functions and Firestore

on:
  push:
    branches:
      - master
    paths:
      - 'functions/**'
      - 'firestore.rules'
      - 'firestore.indexes.json'
      - 'firebase.json'
      - '.github/workflows/functions.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: functions/package-lock.json

      - name: Install and build functions
        working-directory: functions
        run: |
          npm ci
          npm run build

      - name: Setup Firebase CLI
        run: npm install -g firebase-tools

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - name: Verify deploy identity
        run: |
          echo "Deploying as: $(jq -r .client_email "$GOOGLE_APPLICATION_CREDENTIALS")"
          echo "Target project: ${{ secrets.FIREBASE_PROJECT_ID }}"

      - name: Deploy functions, rules, and indexes
        run: |
          firebase deploy --only functions,firestore:rules,firestore:indexes --project "${{ secrets.FIREBASE_PROJECT_ID }}" --force
