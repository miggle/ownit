name: Preview Channel Deploy on PR

on:
  pull_request:
    branches:
      - main

jobs:
  build_and_preview:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # Workload Identity Federation (keyless auth)
      pull-requests: write # to comment the preview URL

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}

      - name: Authenticate to Google Cloud (keyless / OIDC)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/804316033885/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: ownit-deployer@ownit-afc0f.iam.gserviceaccount.com

      - name: Deploy to a preview channel
        id: preview
        run: |
          npm install -g firebase-tools
          firebase hosting:channel:deploy "pr-${{ github.event.number }}" \
            --project ownit-afc0f --expires 7d --json --non-interactive \
            > channel.json
          echo "--- raw channel.json ---"
          cat channel.json
          # `hosting:channel:deploy --json` returns an object keyed by site name
          # (e.g. {"<site>": {"url": "..."}}); older firebase-tools wrapped it as
          # {"result": {...}}. Handle both and just find the first url so a shape
          # change never hard-fails the step.
          URL=$(node -e "
            const j = require('./channel.json');
            const root = j.result || j;
            let url = '';
            const find = (o) => {
              if (!o || typeof o !== 'object') return;
              if (typeof o.url === 'string') { url = o.url; return; }
              for (const k of Object.keys(o)) { find(o[k]); if (url) return; }
            };
            find(root);
            console.log(url);
          ")
          echo "url=$URL" >> "$GITHUB_OUTPUT"
          echo "Preview URL: $URL"

      - name: Comment preview URL on PR
        uses: actions/github-script@v7
        with:
          script: |
            const url = '${{ steps.preview.outputs.url }}';
            if (!url) return;
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `🔎 Preview deployed: ${url}`,
            });
