name: Checks

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - name: Build (web)
        run: npm run build
        env:
          VITE_FIREBASE_API_KEY: test
          VITE_FIREBASE_AUTH_DOMAIN: test.firebaseapp.com
          VITE_FIREBASE_PROJECT_ID: ownit-afc0f
          VITE_FIREBASE_STORAGE_BUCKET: test.firebasestorage.app
          VITE_FIREBASE_MESSAGING_SENDER_ID: "123"
          VITE_FIREBASE_APP_ID: test
      - name: Build (functions)
        working-directory: functions
        run: |
          npm ci
          npm run build
